name = "QLean"
version = "0.1.0"
keywords = ["math", "quantum", "formal verification"]
defaultTargets = ["QLean"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.30.0"

[[require]]
name = "cslib"
scope = "leanprover"
rev = "v4.30.0"

[[lean_lib]]
name = "QLean"
